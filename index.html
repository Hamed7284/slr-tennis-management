<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLR Tennis Academy — سیستم مدیریت</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --clay:#c4622d;--clay2:#e07a45;--clay3:#f0956a;
  --green:#2d6a1f;--green2:#3d8c2a;--green3:#5dbc40;
  --dark:#1a0d06;--dark2:#2a1509;
  --cream:#f5efe6;--gray:#8a7a6e;--lightgray:#e8e0d8;
  --white:#fff;--gold:#e8c14a;
  --shadow:0 4px 24px rgba(26,13,6,.15);
  --radius:10px;
}
body{font-family:'Vazirmatn',sans-serif;background:#f0ece3;color:#2a1509;min-height:100vh;}

/* ── APP SHELL ── */
#app{display:none;}
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a0d06 0%,#3d1a0a 50%,#1a2d10 100%);
  padding:1rem;
}

/* ── LOGIN ── */
.login-card{
  background:rgba(245,239,230,.97);border-radius:20px;
  padding:2.5rem;width:100%;max-width:400px;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-logo .ico{font-size:3rem;display:block;margin-bottom:.5rem;}
.login-logo h1{font-size:1.5rem;font-weight:800;color:var(--dark);letter-spacing:1px;}
.login-logo p{font-size:.8rem;color:var(--gray);margin-top:.2rem;}
.lform-group{margin-bottom:1.2rem;}
.lform-group label{display:block;font-size:.75rem;font-weight:700;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:.5rem;}
.lform-group input,.lform-group select{
  width:100%;padding:.8rem 1rem;border:1.5px solid var(--lightgray);
  border-radius:8px;font-size:.9rem;font-family:'Vazirmatn',sans-serif;
  background:var(--white);outline:none;transition:border-color .3s;direction:rtl;
}
.lform-group input:focus,.lform-group select:focus{border-color:var(--clay2);}
.login-btn{
  width:100%;background:var(--clay2);color:var(--white);
  border:none;border-radius:8px;padding:.9rem;
  font-family:'Vazirmatn',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:all .3s;margin-top:.5rem;
}
.login-btn:hover{background:var(--clay);transform:translateY(-2px);}
.login-err{color:#c0392b;font-size:.8rem;text-align:center;margin-top:.8rem;display:none;}
.login-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:var(--lightgray);border-radius:8px;padding:.3rem;}
.ltab{flex:1;padding:.5rem;border:none;border-radius:6px;font-family:'Vazirmatn',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;background:transparent;color:var(--gray);transition:all .3s;}
.ltab.a{background:var(--white);color:var(--clay);box-shadow:0 2px 8px rgba(0,0,0,.1);}

/* ── TOPBAR ── */
.topbar{
  background:var(--dark);color:var(--cream);
  padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.topbar-logo{font-size:1rem;font-weight:800;letter-spacing:2px;display:flex;align-items:center;gap:.5rem;}
.topbar-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--clay2);}
.topbar-user{display:flex;align-items:center;gap:1rem;}
.topbar-name{font-size:.8rem;color:rgba(245,239,230,.6);}
.topbar-role{font-size:.65rem;background:rgba(196,98,45,.25);color:var(--clay3);border:1px solid rgba(196,98,45,.3);padding:.2rem .6rem;border-radius:20px;letter-spacing:1px;}
.logout-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(245,239,230,.7);padding:.35rem .8rem;border-radius:5px;font-size:.72rem;cursor:pointer;font-family:'Vazirmatn',sans-serif;transition:all .3s;}
.logout-btn:hover{background:rgba(196,98,45,.2);color:var(--cream);}

/* ── NAV TABS ── */
.nav-tabs{
  background:var(--white);border-bottom:2px solid var(--lightgray);
  display:flex;overflow-x:auto;padding:0 1.5rem;
  scrollbar-width:none;
}
.nav-tabs::-webkit-scrollbar{display:none;}
.ntab{
  padding:.9rem 1.4rem;border:none;background:none;
  font-family:'Vazirmatn',sans-serif;font-size:.83rem;font-weight:600;
  color:var(--gray);cursor:pointer;white-space:nowrap;
  border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .25s;
}
.ntab.a{color:var(--clay);border-bottom-color:var(--clay);}
.ntab:hover{color:var(--clay2);}

/* ── MAIN ── */
.main{padding:1.5rem;max-width:1100px;margin:0 auto;}

/* ── CARDS ── */
.card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1.5rem;}
.card-title{font-size:1rem;font-weight:800;color:var(--dark);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem;}
.card-title .ico{font-size:1.2rem;}

/* ── FORM ELEMENTS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--gray);letter-spacing:.5px;margin-bottom:.4rem;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:.7rem 1rem;border:1.5px solid var(--lightgray);
  border-radius:7px;font-size:.88rem;font-family:'Vazirmatn',sans-serif;
  background:var(--white);outline:none;transition:all .3s;direction:rtl;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--clay2);background:#fffaf7;}
.form-group textarea{resize:vertical;min-height:70px;line-height:1.6;}
.form-group select option{background:var(--white);}

/* Rating stars */
.rating-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid #f0ece3;}
.rating-row:last-child{border-bottom:none;}
.rating-label{font-size:.83rem;color:#3a2010;font-weight:500;flex:1;}
.stars-input{display:flex;gap:.3rem;flex-direction:row-reverse;}
.stars-input input{display:none;}
.stars-input label{font-size:1.4rem;color:#ddd;cursor:pointer;transition:color .2s;line-height:1;}
.stars-input input:checked ~ label,.stars-input label:hover,.stars-input label:hover ~ label{color:var(--gold);}

/* checkbox group */
.check-group{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.3rem;}
.check-item{display:flex;align-items:center;gap:.4rem;background:var(--lightgray);border-radius:20px;padding:.3rem .8rem;cursor:pointer;font-size:.78rem;font-weight:500;transition:all .25s;border:1.5px solid transparent;}
.check-item:hover{border-color:var(--clay2);background:#fdf0ea;}
.check-item input{display:none;}
.check-item.checked{background:#fdf0ea;border-color:var(--clay2);color:var(--clay);}

/* status badge */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.5px;}
.badge-green{background:#edfaf0;color:#2d7a3a;border:1px solid #b8e8c0;}
.badge-clay{background:#fdf0ea;color:var(--clay);border:1px solid #f0c0a0;}
.badge-gray{background:var(--lightgray);color:var(--gray);border:1px solid #d0c8c0;}
.badge-gold{background:#fdf8e8;color:#8a6a10;border:1px solid #e8d890;}

/* ── SUBMIT BTN ── */
.submit-btn{
  background:var(--clay2);color:var(--white);
  border:none;border-radius:8px;padding:.9rem 2rem;
  font-family:'Vazirmatn',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:.5rem;
}
.submit-btn:hover{background:var(--clay);transform:translateY(-2px);box-shadow:0 6px 20px rgba(196,98,45,.3);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--clay2);}
.stat-card.green{border-top-color:var(--green3);}
.stat-card.gold{border-top-color:var(--gold);}
.stat-card.dark{border-top-color:var(--dark);}
.stat-n{font-size:2rem;font-weight:800;color:var(--dark);line-height:1;}
.stat-l{font-size:.72rem;color:var(--gray);margin-top:.3rem;font-weight:600;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
thead tr{background:var(--dark);color:var(--cream);}
thead th{padding:.8rem 1rem;text-align:right;font-weight:600;font-size:.75rem;letter-spacing:.5px;white-space:nowrap;}
tbody tr{border-bottom:1px solid #f0ece3;transition:background .2s;}
tbody tr:hover{background:#fdf8f5;}
tbody td{padding:.75rem 1rem;color:#2a1509;vertical-align:middle;}

/* ── REPORT VIEW ── */
.report-card{
  background:var(--white);border-radius:var(--radius);padding:1.8rem;
  box-shadow:var(--shadow);margin-bottom:1rem;
  border-right:4px solid var(--clay2);
  cursor:pointer;transition:all .3s;
}
.report-card:hover{box-shadow:0 8px 30px rgba(196,98,45,.15);transform:translateX(-3px);}
.rc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.8rem;}
.rc-name{font-size:1rem;font-weight:800;color:var(--dark);}
.rc-meta{font-size:.75rem;color:var(--gray);margin-top:.2rem;}
.rc-score{text-align:center;}
.rc-score-n{font-size:1.8rem;font-weight:800;color:var(--clay);}
.rc-score-l{font-size:.65rem;color:var(--gray);}
.rc-skills{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem;}
.skill-pill{background:#fdf0ea;color:var(--clay);border:1px solid #f0c0a0;border-radius:20px;padding:.2rem .7rem;font-size:.7rem;font-weight:600;}

/* ── PROGRESS BAR ── */
.progress-wrap{margin:.4rem 0;}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--gray);margin-bottom:.2rem;}
.progress-bar{height:6px;background:#f0ece3;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--clay2),var(--clay3));transition:width .6s ease;}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem;}
.modal-ov.on{display:flex;}
.modal-box{background:var(--white);border-radius:16px;padding:2rem;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--lightgray);}
.modal-title{font-size:1.1rem;font-weight:800;color:var(--dark);}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray);transition:color .3s;padding:.2rem;}
.modal-close:hover{color:var(--clay);}

/* ── ALERT ── */
.alert{border-radius:8px;padding:.9rem 1.2rem;margin-bottom:1rem;font-size:.85rem;display:none;}
.alert-success{background:#edfaf0;border:1px solid #b8e8c0;color:#2d7a3a;}
.alert-err{background:#fdecea;border:1px solid #f5b8b0;color:#c0392b;}
.alert.show{display:block;}

/* ── PRINT ── */
@media print{
  .topbar,.nav-tabs,.no-print{display:none!important;}
  .main{padding:0;max-width:none;}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;}
}

/* ── SECTION HEADER ── */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.section-title{font-size:1.1rem;font-weight:800;color:var(--dark);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:3rem;color:var(--gray);}
.empty-state .ico{font-size:3rem;display:block;margin-bottom:.8rem;}
.empty-state p{font-size:.9rem;}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .form-grid,.form-grid-3{grid-template-columns:1fr;}
  .main{padding:1rem;}
}

/* SECTION DIVIDER */
.sec-divider{font-size:.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--clay);background:#fdf0ea;border:1px solid #f0c0a0;border-radius:5px;padding:.3rem .8rem;display:inline-block;margin-bottom:.8rem;}

/* PLAYER ROW in selector */
.player-option{padding:.6rem 1rem;border-bottom:1px solid #f0ece3;cursor:pointer;display:flex;align-items:center;gap:.8rem;transition:background .2s;border-radius:6px;}
.player-option:hover{background:#fdf0ea;}
.p-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:var(--white);}
.p-name{font-size:.88rem;font-weight:700;color:var(--dark);}
.p-level{font-size:.72rem;color:var(--gray);}
</style>
</head>
<body>

<!-- ════════════════════════════════
     LOGIN SCREEN
════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span class="ico">🎾</span>
      <h1>SLR Tennis Academy</h1>
      <p>سیستم مدیریت آکادمی</p>
    </div>
    <div class="lform-group" style="margin-bottom:1.5rem;">
      <div class="login-tabs">
        <button class="ltab a" id="ltab-staff" onclick="setLoginTab('staff')">مدیر / مربی</button>
        <button class="ltab" id="ltab-player" onclick="setLoginTab('player')">بازیکن</button>
      </div>
    </div>
    <div id="staffLoginFields">
      <div class="lform-group">
        <label>ایمیل</label>
        <input type="email" id="loginEmail" placeholder="email@example.com" dir="ltr" style="text-align:left" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="lform-group">
        <label>رمز عبور</label>
        <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <div id="playerLoginFields" style="display:none;">
      <div class="lform-group">
        <label>شماره موبایل (نام کاربری)</label>
        <input type="text" id="loginPlayerName" placeholder="09xxxxxxxxx" dir="ltr" style="text-align:left" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="lform-group">
        <label>رمز عبور</label>
        <input type="text" id="loginPlayerCode" placeholder="رمز عبور (پیش‌فرض: همان شماره موبایل)" dir="ltr" style="text-align:left" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <div class="login-err" id="loginErr">❌ ایمیل یا رمز اشتباه است</div>
    <button class="login-btn" onclick="doLogin()">ورود به سیستم</button>
  </div>
</div>

<!-- ════════════════════════════════
     MAIN APP
════════════════════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo"><span class="dot"></span>SLR TENNIS</div>
    <div class="topbar-user">
      <div>
        <div class="topbar-name" id="topbarName"></div>
        <div class="topbar-role" id="topbarRole"></div>
      </div>
      <button class="logout-btn" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <!-- NAV (dynamic based on role) -->
  <div class="nav-tabs" id="navTabs"></div>

  <!-- MAIN CONTENT -->
  <div class="main" id="mainContent"></div>
</div>

<!-- ════════════════════════════════
     REPORT DETAIL MODAL
════════════════════════════════ -->
<div class="modal-ov" id="reportModal" onclick="if(event.target===this)this.classList.remove('on')">
  <div class="modal-box" id="reportModalContent"></div>
</div>

<script>

ht:800;color:${n.paid?'var(--gray)':'#c0392b'};margin-bottom:.4rem;"> ${n.amount.toLocaleString('fa-IR')} تومان ${n.paid ? '<span class="badge badge-green" style="margin-right:.5rem;">تسویه‌شده</span>' : '<span class="badge badge-clay" style="margin-right:.5rem;">پرداخت‌نشده</span>'} </div> ${n.note ? `<div style="font-size:.85rem;color:var(--dark);line-height:1.8;margin-bottom:.4rem;">${n.note}</div>` : ''} ${n.dueDate ? `<div style="font-size:.8rem;color:var(--gray);">⏰ سررسید: ${toJalali(n.dueDate)}</div>` : ''} </div>`; const html = ` <div class="section-title" style="margin-bottom:1.5rem;">💳 وضعیت مالی من</div> ${unpaid.length===0 && paid.length===0 ? `<div class="empty-state"><span class="ico">✅</span><p>هیچ بدهی ثبت‌شده‌ای ندارید</p></div>` : ''} ${unpaid.length>0 ? unpaid.map(cardHtml).join('') : ''} ${paid.length>0 ? ` <div class="sec-divider" style="margin-top:1.5rem;">تسویه‌شده‌ها</div> ${paid.map(cardHtml).join('')} ` : ''} `; document.getElementById('mainContent').innerHTML = html; } document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; if(GAS_URL === 'https://script.google.com/macros/s/AKfycbxpNz0EjFHG4FqwYmj8RyHQW98KI3PC77l2KC-CZbK1afTh-okrz9NGPy5NbLXLUdHH/exec'){ const banner = document.createElement('div'); banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#e07a45;color:#fff;text-align:center;padding:.8rem;font-family:Vazirmatn,sans-serif;font-size:.85rem;z-index:9999;direction:rtl;'; banner.innerHTML='⚙️ <b>حالت محلی:</b> برای اشتراک‌گذاری داده بین دستگاه‌ها، Apps Script را راه‌اندازی کنید. <a href="#" style="color:#fff;text-decoration:underline" onclick="this.parentElement.remove()">بستن</a>'; document.body.appendChild(banner); }
</script>
